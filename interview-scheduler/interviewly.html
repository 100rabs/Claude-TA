<style>
  :root {

    --border: #e6e6e8;
    --border-strong: #d4d4d8;
    --text: #0f0f10;
    --text-2: #52525b;
    --text-3: #a1a1aa;
    --success: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --info: #0ea5e9;

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
  .chip-accent { background: var(--accent-50); color: var(--accent); border-color: var(--accent-100); }
  .chip-success { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
  .chip-warn { background: #fffbeb; color: #b45309; border-color: #fde68a; }
  .chip-danger { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .chip-info { background: #f0f9ff; color: #0369a1; border-color: #bae6fd; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 7px; font-size: 13px; font-weight: 500; border: 1px solid var(--border-strong); background: var(--bg); color: var(--text); cursor: pointer; transition: all .12s ease; }
  .btn:hover { background: var(--surface); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }

  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }
  .btn-danger { color: var(--danger); border-color: #fecaca; }
  .btn-danger:hover { background: #fef2f2; }
  .input, .select, .textarea { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: 7px; background: var(--bg); color: var(--text); font-family: inherit; }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-50); }
  .textarea { resize: vertical; min-height: 80px; }
  .kbd { font-family: ui-monospace, monospace; font-size: 11px; padding: 1px 5px; background: var(--surface-2); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px; color: var(--text-2); }
  .divider { height: 1px; background: var(--border); }

  .sidebar-item:hover { background: var(--surface-2); color: var(--text); }
  .sidebar-item.active { background: var(--accent-50); color: var(--accent); }

  .avatar-sm { width: 22px; height: 22px; font-size: 10px; }
  .avatar-lg { width: 40px; height: 40px; font-size: 14px; }
  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data th { text-align: left; font-weight: 500; color: var(--text-2); padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  table.data td { padding: 11px 12px; border-bottom: 1px solid var(--border); }
  table.data tbody tr { cursor: pointer; }
  table.data tbody tr:hover { background: var(--surface); }
  .metric { padding: 16px; }
  .metric-label { font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.03em; font-weight: 500; }
  .metric-value { font-size: 26px; font-weight: 600; margin-top: 4px; letter-spacing: -0.02em; }
  .metric-delta { font-size: 12px; margin-top: 4px; color: var(--text-2); }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,15,16,.4); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: white; border-radius: 12px; width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.18); }
  .modal-lg { max-width: 920px; }
  .modal-xl { max-width: 1100px; }

  .tab:hover { background: var(--surface-2); color: var(--text); }
  .tab.active { background: var(--surface-2); color: var(--text); }
  .dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; }
  .slot-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all .12s; }
  .slot-card:hover { border-color: var(--accent); }
  .slot-card.selected { border-color: var(--accent); background: var(--accent-50); }
  .rubric-cell { padding: 10px; border: 1px solid var(--border); border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-2); }
  .rubric-cell:hover { border-color: var(--accent); background: var(--accent-50); color: var(--accent); }
  .rubric-cell.selected { border-color: var(--accent); background: var(--accent); color: white; }
  .banner { padding: 10px 14px; border-radius: 8px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .banner-warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
  .banner-info { background: #f0f9ff; border: 1px solid #bae6fd; color: #075985; }
  .banner-danger { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .banner-success { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; }
  .highlight-bias { background: #fff3cd; border-bottom: 2px dotted #b45309; padding: 0 2px; border-radius: 2px; cursor: help; }
  .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .anim-fade { animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .role-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong); }
  .role-pill.active { background: var(--text); color: white; border-color: var(--text); }
  .progress { height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .blind { filter: blur(6px); user-select: none; color: transparent !important; background: var(--surface-2) !important; border-radius: 4px; }
  .blind::before { content: "••••••••"; filter: none; color: var(--text-3); font-weight: 600; letter-spacing: 2px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white; padding: 12px 18px; border-radius: 8px; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,.2); z-index: 100; animation: fade .2s ease; }
</style>
</head>

function daysFromNow(n, hours=10, minutes=0) {
  const d = new Date();
  d.setDate(d.getDate() + n);

  return d;
}

/* ---------- BIAS LEXICON ---------- */
const BIAS_LEXICON = {
  "culture-fit": { pattern: /\b(culture fit|cultural fit|not a fit|vibe|chemistry|clicked|didn't click|one of us)\b/gi, severity: "high", note: "Vague 'culture' language often masks in-group bias — tie feedback to specific behaviours instead." },
  "gender-coded": { pattern: /\b(aggressive|abrasive|bossy|pushy|shrill|emotional|nurturing|pleasant|bubbly|gentle)\b/gi, severity: "high", note: "These adjectives are empirically applied asymmetrically to women in reviews." },
  "age-coded": { pattern: /\b(young|energetic|digital native|seasoned|mature|old school|fresh|veteran)\b/gi, severity: "medium", note: "Age-coded terms can introduce age bias. Describe skills and energy patterns concretely." },
  "confidence-bias": { pattern: /\b(too confident|too quiet|overly assertive|timid|arrogant|humble to a fault)\b/gi, severity: "medium", note: "Confidence calibration is often subjective; anchor to observed behaviours (e.g. 'did not seek input')." },
  "likability": { pattern: /\b(likable|likeable|friendly|nice person|personable|pleasant to work with)\b/gi, severity: "low", note: "'Likability' is weakly correlated with performance. Prefer: 'collaborates effectively because...' with evidence." },
  "name-pedigree": { pattern: /\b(ivy league|tier-1 school|pedigree|brand name|no-name school)\b/gi, severity: "high", note: "School brand bias — focus on demonstrated skills, not institutional prestige." },
  "appearance": { pattern: /\b(polished|well-dressed|professional appearance|unkempt|sloppy)\b/gi, severity: "medium", note: "Appearance signals are rarely relevant to job performance." },
};

function runBiasScan(text) {
  const flags = [];
  for (const [cat, { pattern, severity, note }] of Object.entries(BIAS_LEXICON)) {
    const matches = [...text.matchAll(pattern)];
    if (matches.length > 0) {
      flags.push({ category: cat, severity, note, hits: matches.map(m => m[0]) });
    }
  }
  return flags;
}

/* ---------- CALENDAR MOCK ---------- */
// Build free/busy data: block random hours; free slots are the gaps.
function seededRandom(seed) {
  let x = seed;
  return () => { x = (x * 9301 + 49297) % 233280; return x / 233280; };
}

function generateBusyForPanel(panelId) {
  const rand = seededRandom(panelId.split("").reduce((a,c) => a + c.charCodeAt(0), 0));
  const busy = [];
  for (let d = 0; d < 10; d++) {
    const date = daysFromNow(d+1, 0);
    if (date.getDay() === 0 || date.getDay() === 6) continue;
    // Generate 2-5 busy blocks in 9am-6pm
    const n = 2 + Math.floor(rand() * 4);
    for (let i = 0; i < n; i++) {
      const h = 9 + Math.floor(rand() * 9);
      const len = [30,60,60,60,90][Math.floor(rand()*5)];
      const start = new Date(date); start.setHours(h, rand() > 0.5 ? 0 : 30, 0, 0);
      const end = new Date(start.getTime() + len * 60000);
      busy.push({ start, end });
    }
  }
  return busy;
}

const CALENDAR_BUSY = {};
PANELS.forEach(p => { CALENDAR_BUSY[p.id] = generateBusyForPanel(p.id); });

function findOverlappingSlots(panelIds, durationMin, daysAhead=10) {
  const slots = [];
  for (let d = 1; d <= daysAhead; d++) {
    const date = daysFromNow(d, 0);
    if (date.getDay() === 0 || date.getDay() === 6) continue;
    // Check 9am to 5pm in 30min increments
    for (let h = 9; h < 17; h++) {
      for (let m of [0, 30]) {
        const start = new Date(date); start.setHours(h, m, 0, 0);
        const end = new Date(start.getTime() + durationMin * 60000);
        if (end.getHours() > 17 || (end.getHours() === 17 && end.getMinutes() > 0)) continue;
        let ok = true;
        for (const pid of panelIds) {
          const busy = CALENDAR_BUSY[pid] || [];
          for (const b of busy) {
            if (b.start < end && b.end > start) { ok = false; break; }
          }
          if (!ok) break;
        }
        if (ok) slots.push({ start, end });
      }
    }
  }
  return slots;
}

function fmtDate(d, opts={}) {
  if (!(d instanceof Date)) d = new Date(d);
  const o = { weekday: 'short', month: 'short', day: 'numeric', ...opts };
  return d.toLocaleDateString('en-US', o);
}
function fmtTime(d) {
  if (!(d instanceof Date)) d = new Date(d);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function fmtDateTime(d) { return fmtDate(d) + " · " + fmtTime(d); }
function relativeTime(d) {
  if (!(d instanceof Date)) d = new Date(d);
  const diffMs = d.getTime() - Date.now();
  const absH = Math.abs(diffMs) / 36e5;
  const sign = diffMs >= 0 ? "in " : "";
  const suffix = diffMs < 0 ? " ago" : "";
  if (absH < 1) { const m = Math.round(Math.abs(diffMs) / 60000); return sign + m + "m" + suffix; }
  if (absH < 48) { const h = Math.round(absH); return sign + h + "h" + suffix; }
  const days = Math.round(absH / 24);
  return sign + days + "d" + suffix;
}
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function buildPendingActions() {
  const acts = [];
  // Flag reschedule counts
  CANDIDATES.filter(c => c.rescheduleCount >= 2).forEach(c => {
    acts.push({ title: "High reschedule count", detail: `${c.name} has rescheduled ${c.rescheduleCount} times`, color: "var(--warn)", action: `openCandidate('${c.id}')` });
  });
  // Bias flags
  INTERVIEWS.forEach(i => {
    i.feedback.forEach(f => {
      if (f.biasFlags.length > 0) {
        const c = candidateById(i.candidateId);
        acts.push({ title: "Bias flag on feedback", detail: `${c.name} · ${panelById(f.panelId).name} — ${f.biasFlags.length} pattern${f.biasFlags.length > 1 ? 's' : ''} flagged`, color: "var(--danger)", action: `nav('bias')` });
      }
    });
  });
  // Pending feedback
  INTERVIEWS.filter(i => i.status === "completed").forEach(i => {
    const missing = i.panelIds.filter(pid => !i.feedback.find(f => f.panelId === pid));
    missing.forEach(pid => {
      const c = candidateById(i.candidateId);
      acts.push({ title: "Feedback overdue", detail: `${panelById(pid).name} hasn't submitted for ${c.name}`, color: "var(--warn)", action: `openInterview('${i.id}')` });
    });
  });
  // Scheduling needed
  CANDIDATES.forEach(c => {
    if (c.stage === "rejected" || c.stage === "offer") return;
    const last = interviewsByCandidate(c.id).slice(-1)[0];
    if (!last || last.status === "completed") {
      const next = STAGES.find(s => s.id === c.stage);
      if (next) acts.push({ title: "Schedule next round", detail: `${c.name} → ${next.name}`, color: "var(--accent)", action: `openScheduler('${c.id}','${c.stage}')` });
    }
  });
  return acts.slice(0, 8);
}

function renderFunnel() {
  const stages = ["screening","r1","r2","r3","presentation","hm","offer"];
  const byStage = {};
  // Compute how many candidates have reached each stage (inclusive of beyond)
  const stageOrder = ["screening","r1","r2","r3","presentation","hm","offer"];
  stageOrder.forEach(s => byStage[s] = 0);
  CANDIDATES.forEach(c => {
    if (c.stage === "rejected") {
      // attribute to last reached stage via interviews
      const ivs = interviewsByCandidate(c.id);
      if (ivs.length > 0) {
        const last = ivs[ivs.length-1].stageId;
        const idx = stageOrder.indexOf(last);
        for (let i = 0; i <= idx; i++) byStage[stageOrder[i]]++;
      }
    } else {
      const idx = stageOrder.indexOf(c.stage);
      for (let i = 0; i <= idx; i++) byStage[stageOrder[i]]++;
    }
  });
  const max = Math.max(...Object.values(byStage), 1);
  return `
    <div class="space-y-2">
      ${stageOrder.map((s,i) => {
        const cnt = byStage[s];
        const prev = i > 0 ? byStage[stageOrder[i-1]] : cnt;
        const rate = prev > 0 ? Math.round(cnt / prev * 100) : 100;
        const name = s === "offer" ? "Offer" : stageById(s)?.name || s;
        return `
          <div class="flex items-center gap-3">
            <div class="w-36 text-sm text-[var(--text-2)]">${esc(name)}</div>
            <div class="flex-1 relative h-7 bg-[var(--surface-2)] rounded overflow-hidden">
              <div class="h-full bg-[var(--accent)] rounded flex items-center px-2 text-xs text-white font-medium" style="width:${cnt/max*100}%">${cnt}</div>
            </div>
            <div class="w-16 text-right text-xs text-[var(--text-2)]">${i > 0 ? rate + "%" : "—"}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderBiasHighlighted(text, flags) {
  let out = esc(text);
  flags.forEach(flag => {
    const re = new RegExp(`\\b(${flag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})\\b`, "gi");
    out = out.replace(re, '<span class="highlight-bias" title="Flagged by AI bias scan">$1</span>');
  });
  return out;
}

function renderConsistencyPanel(interview) {
  // Calculate score variance
  const criteria = Object.keys(interview.feedback[0].scores);
  const variance = {};
  criteria.forEach(k => {
    const vals = interview.feedback.map(f => f.scores[k]);
    const mean = vals.reduce((a,b)=>a+b,0)/vals.length;
    variance[k] = Math.max(...vals) - Math.min(...vals);
  });
  const maxGap = Math.max(...Object.values(variance));
  const recs = interview.feedback.map(f => f.recommendation);
  const hasStrongYes = recs.some(r => r === "strong_yes");
  const hasNo = recs.some(r => r === "no" || r === "strong_no");
  const disagreement = hasStrongYes && hasNo;

  if (!disagreement && maxGap < 3) return '';

  return `
    <div class="banner banner-warn">
      ${ICON.alert}
      <div class="flex-1">
        <div class="font-semibold mb-1">Consistency Check — Panel disagreement detected</div>
        <div class="text-xs mb-2">Score spread up to <strong>${maxGap} points</strong>${disagreement ? ' · recommendations span Strong Yes to No' : ''}. Worth discussing in calibration.</div>
        <div class="grid grid-cols-${criteria.length} gap-2 mt-3">
          ${criteria.map(k => `
            <div class="bg-white rounded p-2 text-center">
              <div class="text-[10px] text-[var(--text-3)] uppercase">${esc(k)}</div>
              <div class="text-lg font-semibold ${variance[k] >= 3 ? 'text-[var(--danger)]' : ''}">${variance[k]}pt</div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function renderConsistencyTab() {
  const multiPanel = INTERVIEWS.filter(i => i.feedback.length >= 2);
  const items = multiPanel.map(iv => {
    const criteria = Object.keys(iv.feedback[0].scores);
    const variance = {};
    criteria.forEach(k => {
      const vals = iv.feedback.map(f => f.scores[k]);
      variance[k] = Math.max(...vals) - Math.min(...vals);
    });
    const maxGap = Math.max(...Object.values(variance));
    const recs = [...new Set(iv.feedback.map(f => f.recommendation))];
    const disagreement = recs.includes("strong_yes") && (recs.includes("no") || recs.includes("strong_no"));
    return { iv, maxGap, disagreement };
  }).sort((a,b) => b.maxGap - a.maxGap);

  return `
    <div class="card p-5 mb-4">
      <div class="font-semibold">Consistency Tracker</div>
      <div class="text-sm text-[var(--text-2)] mt-1">Flags interviews where panelists rate the same candidate very differently on the same rubric criteria.</div>
    </div>
    <div class="space-y-3">
      ${items.length === 0 ? '<div class="card p-6 text-center text-[var(--text-3)]">No multi-panel stages to compare yet.</div>' : ''}
      ${items.map(({ iv, maxGap, disagreement }) => {
        const c = candidateById(iv.candidateId); const s = stageById(iv.stageId);
        const sev = disagreement ? "danger" : maxGap >= 3 ? "warn" : "";
        return `
          <div class="card p-4">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="font-medium">${esc(c.name)} · ${esc(s.name)}</div>
                <div class="text-xs text-[var(--text-2)] mt-0.5">${fmtDate(iv.scheduledAt)} · ${iv.feedback.length} panelists</div>
              </div>
              ${disagreement ? '<span class="chip chip-danger">Strong disagreement</span>' : maxGap >= 3 ? `<span class="chip chip-warn">${maxGap}pt spread</span>` : '<span class="chip chip-success">Aligned</span>'}
            </div>
            <div class="grid grid-cols-${iv.feedback.length} gap-2">
              ${iv.feedback.map(f => {
                const p = panelById(f.panelId);
                const avg = Object.values(f.scores).reduce((a,b)=>a+b,0)/Object.values(f.scores).length;
                return `
                  <div class="p-3 bg-[var(--surface)] rounded">
                    <div class="flex items-center gap-2 mb-2">${avatar(p.id,"avatar-sm")}<span class="text-xs font-medium truncate">${esc(p.name)}</span></div>
                    <div class="text-lg font-semibold">${avg.toFixed(1)} / 5</div>
                    <div>${recommendationChip(f.recommendation)}</div>
                  </div>
                `;
              }).join("")}
            </div>
            ${disagreement ? `<div class="mt-3 text-xs text-[var(--text-2)] italic">Schedule a 15min calibration to resolve before advancing.</div>` : ''}
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderDiversity() {
  // Aggregate pass rates across stages by gender / ethnicity (purely illustrative)
  const byStage = {};
  const totalCount = CANDIDATES.length;
  const categories = ["gender","ethnicity"];

  const computeRates = (field) => {
    const groups = {};
    CANDIDATES.forEach(c => { const g = c[field] || "—"; if (!groups[g]) groups[g] = { total: 0, past_screen: 0, past_r2: 0, offers: 0 }; });
    CANDIDATES.forEach(c => {
      const g = c[field] || "—";
      groups[g].total++;
      const order = ["applied","screening","r1","r2","r3","presentation","hm","offer"];
      const idx = order.indexOf(c.stage === "rejected" ? "applied" : (c.stage === "offer" ? "offer" : c.stage));
      if (idx >= order.indexOf("r1")) groups[g].past_screen++;
      if (idx >= order.indexOf("r2")) groups[g].past_r2++;
      if (c.stage === "offer") groups[g].offers++;
    });
    return groups;
  };

  const genderRates = computeRates("gender");
  const ethRates = computeRates("ethnicity");

  const tableFor = (title, rates) => `
    <div class="card">
      <div class="px-4 py-3 border-b border-[var(--border)] font-semibold">${title}</div>
      <table class="data">
        <thead><tr><th>Group</th><th>Total</th><th>Past Screening</th><th>Past Round 2</th><th>Offers</th></tr></thead>
        <tbody>
          ${Object.entries(rates).map(([k, v]) => `
            <tr>
              <td><span class="chip">${esc(k)}</span></td>
              <td>${v.total}</td>
              <td>${v.past_screen} <span class="text-[var(--text-3)] text-xs">(${v.total ? Math.round(v.past_screen/v.total*100) : 0}%)</span></td>
              <td>${v.past_r2} <span class="text-[var(--text-3)] text-xs">(${v.total ? Math.round(v.past_r2/v.total*100) : 0}%)</span></td>
              <td>${v.offers}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  return `
    <div class="banner banner-info mb-4">
      ${ICON.shield}
      <div>
        <div class="font-semibold mb-0.5">Diversity Signal (opt-in)</div>
        <div class="text-xs">Aggregate pass/fail rates by self-declared demographics, shown only after the process completes. Numbers below are from demo data. Real deployments should use differential privacy thresholds (min N=10 per cohort).</div>
      </div>
    </div>

    <div class="space-y-4">
      ${tableFor("Pipeline throughput — by gender", genderRates)}
      ${tableFor("Pipeline throughput — by ethnicity", ethRates)}
    </div>
  `;
}

          <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-2">Next steps</div>
          <div class="space-y-2 text-sm">
            <div class="flex items-center gap-2">${ICON.clock}<span>Panel confirms within 24h</span></div>
            <div class="flex items-center gap-2">${ICON.mail}<span>Candidate receives scheduling link</span></div>
            <div class="flex items-center gap-2">${ICON.video}<span>Google Meet link auto-generated</span></div>
            <div class="flex items-center gap-2">${ICON.bell}<span>Reminder cadence: 48h / 24h / 2h</span></div>
          </div>
        </div>
        <button class="btn btn-primary mt-5" onclick="closeModal()">Done</button>
      </div>
    `;
  }
}

function renderPanelInterviewModal() {
  const { interviewId, step } = state.modal.data;
  const i = INTERVIEWS.find(x => x.id === interviewId);
  const c = candidateById(i.candidateId);
  const j = jobById(i.jobId);
  const s = stageById(i.stageId);
  const cfg = j.stageConfig[i.stageId];
  const me = PANELS[0]; // pretend Priya
  const myFb = i.feedback.find(f => f.panelId === me.id);
  const blind = !myFb && i.status === "scheduled";

  return `
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="font-semibold text-lg">${esc(s.name)}</div>
        <div class="text-sm text-[var(--text-2)]">${esc(j.title)} · ${fmtDateTime(i.scheduledAt)}</div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()">${ICON.x}</button>
    </div>
    <div class="p-5">
      ${blind ? `
        <div class="banner banner-info mb-4">${ICON.shield}<div><div class="font-semibold mb-0.5">Blind review active</div><div class="text-xs">Candidate name and demographic signals are hidden until you submit feedback. Focus on the rubric.</div></div></div>
      ` : ''}

      <div class="flex items-start gap-4 mb-5 pb-5 border-b border-[var(--border)]">
        ${blind ? '<div class="avatar avatar-lg" style="background:var(--surface-2);color:var(--text-3)">?</div>' : avatar(c.id,"avatar-lg")}
        <div class="flex-1">
          <div class="font-medium">${blind ? `Candidate #${c.id.toUpperCase()}` : esc(c.name)}</div>
          <div class="text-sm text-[var(--text-2)]">${esc(j.title)}</div>
        </div>
        <a href="https://${i.meetLink}" target="_blank" class="btn btn-primary">${ICON.video}Join Meeting</a>
      </div>

      <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-1">Assessment focus</div>
      <div class="text-sm mb-4">${esc(cfg.focus)}</div>

      ${i.notes ? `<div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-1">Recruiter note</div><div class="text-sm bg-[var(--surface)] p-3 rounded border border-[var(--border)] mb-4">${esc(i.notes)}</div>` : ''}

      <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-1">Resume</div>
      <div class="flex items-center gap-2 p-2 bg-[var(--surface-2)] rounded mb-4">${ICON.file}<span class="text-sm flex-1 truncate">${blind ? 'candidate-resume.pdf' : esc(c.resume)}</span><button class="btn btn-sm btn-ghost">Open</button></div>

      ${!myFb && i.status !== "scheduled" ? `
        <button class="btn btn-primary w-full justify-center" onclick="openFeedbackForm('${i.id}')">Submit Feedback ${ICON.arrow}</button>
      ` : myFb ? `
        <div class="banner banner-success">${ICON.check}<div>Feedback submitted — ${relativeTime(myFb.submittedAt)}</div></div>
      ` : `
        <div class="text-sm text-[var(--text-2)] text-center p-3">Feedback form will unlock after the interview.</div>
      `}
    </div>
  `;
}

function renderFeedbackForm() {
  const { interviewId, scores, freeText, recommendation } = state.modal.data;
  const i = INTERVIEWS.find(x => x.id === interviewId);
  const c = candidateById(i.candidateId);
  const s = stageById(i.stageId);
  const criteria = ["System Design", "Problem Solving", "Communication", "Leadership"];
  const scoresFilled = criteria.every(k => scores[k] != null);

  return `
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="font-semibold text-lg">Feedback — ${esc(s.name)}</div>
        <div class="text-sm text-[var(--text-2)]">For Candidate #${c.id.toUpperCase()} · Blinded review</div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()">${ICON.x}</button>
    </div>
    <div class="p-5">
      <div class="banner banner-info mb-5">${ICON.shield}<div class="text-xs">Structured scoring is required before the free-text box unlocks. This forces anchoring to rubric criteria.</div></div>

      ${criteria.map(k => `
        <div class="mb-4">
          <div class="text-sm font-medium mb-2">${esc(k)}</div>
          <div class="grid grid-cols-6 gap-1.5">
            ${[0,1,2,3,4,5].map(n => `
              <div class="rubric-cell ${scores[k]===n?'selected':''}" onclick="setScore('${k}',${n})">${n}</div>
            `).join("")}
          </div>
        </div>
      `).join("")}

      <div class="mb-4">
        <div class="text-sm font-medium mb-2">Recommendation</div>
        <div class="grid grid-cols-4 gap-1.5">
          ${[["strong_yes","Strong Yes"],["yes","Yes"],["no","No"],["strong_no","Strong No"]].map(([v,l]) => `
            <div class="rubric-cell ${recommendation===v?'selected':''}" onclick="setRec('${v}')">${l}</div>
          `).join("")}
        </div>
      </div>

      <div class="mb-4 ${!scoresFilled ? 'opacity-50' : ''}">
        <div class="text-sm font-medium mb-2">Written feedback ${!scoresFilled ? '<span class="text-xs text-[var(--text-3)]">(unlocks after scoring)</span>' : ''}</div>
        <textarea class="textarea" ${!scoresFilled ? 'disabled' : ''} placeholder="Concrete examples from the interview. Focus on what they did — not your impressions of who they are." id="fb-free" oninput="state.modal.data.freeText=this.value">${esc(freeText||'')}</textarea>
        <div class="text-xs text-[var(--text-3)] mt-1">An AI bias scan will run automatically on submission. Flags are private to the recruiter.</div>
      </div>

      <div class="flex justify-end gap-2">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" ${!scoresFilled || !recommendation ? 'disabled' : ''} onclick="submitFeedback()">Submit Feedback</button>
      </div>
    </div>
  `;
}

function renderBulkImportModal() {
  return `
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div class="font-semibold text-lg">Bulk Import Candidates</div>
      <button class="btn btn-ghost" onclick="closeModal()">${ICON.x}</button>
    </div>
    <div class="p-5">
      <div class="card p-6 text-center border-dashed mb-4" style="border-style:dashed">
        ${ICON.upload}
        <div class="font-medium mt-2">Drop CSV here or click to upload</div>
        <div class="text-xs text-[var(--text-3)] mt-1">Expected columns: name, email, linkedin, resume_url</div>
      </div>
      <div class="mb-4">
        <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-2">Sample preview</div>
        <table class="data card overflow-hidden">
          <thead><tr><th>Name</th><th>Email</th><th>LinkedIn</th><th>Status</th></tr></thead>
          <tbody>
            <tr><td>Sarah Chen</td><td>sarah@email.com</td><td>linkedin.com/in/sarahchen</td><td><span class="chip chip-success">Ready</span></td></tr>
            <tr><td>James Williams</td><td>james@email.com</td><td>linkedin.com/in/jameswilliams</td><td><span class="chip chip-success">Ready</span></td></tr>
            <tr><td>Priya K</td><td>—</td><td>linkedin.com/in/priyak</td><td><span class="chip chip-warn">Missing email</span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="flex justify-end gap-2"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="toast('3 candidates imported');closeModal()">Import</button></div>
    </div>
  `;
}

function renderRescheduleModal() {
  const { interviewId } = state.modal.data;
  const i = INTERVIEWS.find(x => x.id === interviewId);
  const j = jobById(i.jobId); const cfg = j.stageConfig[i.stageId];
  const newSlots = findOverlappingSlots(cfg.panel, cfg.duration).slice(0, 5);

  return `
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="font-semibold text-lg">Reschedule Interview</div>
        <div class="text-sm text-[var(--text-2)]">${fmtDateTime(i.scheduledAt)} → new slot</div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()">${ICON.x}</button>
    </div>
    <div class="p-5">
      <div class="mb-4">
        <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-1">Reason (optional)</div>
        <select class="select mb-2"><option>Candidate requested</option><option>Panelist conflict</option><option>Recruiter decision</option><option>Other</option></select>
        <textarea class="textarea" placeholder="Free-text explanation…"></textarea>
      </div>
      <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-2">New available slots</div>
      <div class="space-y-2 mb-5">
        ${newSlots.slice(0,4).map((slot,idx) => `
          <label class="slot-card flex items-center gap-3 ${idx===0?'selected':''}">
            <input type="radio" name="new-slot" ${idx===0?'checked':''}/>
            <div class="flex-1">
              <div class="font-medium">${fmtDate(slot.start,{weekday:'long',month:'long',day:'numeric'})}</div>
              <div class="text-sm text-[var(--text-2)]">${fmtTime(slot.start)} – ${fmtTime(slot.end)}</div>
            </div>
          </label>
        `).join("")}
      </div>
      <div class="flex justify-end gap-2">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="toast('Reschedule confirmed. All parties notified.');closeModal()">Confirm Reschedule</button>
      </div>
    </div>
  `;
}

function renderBiasReviewModal() {
  const { interviewId, panelId } = state.modal.data;
  const i = INTERVIEWS.find(x => x.id === interviewId);
  const f = i.feedback.find(x => x.panelId === panelId);
  const p = panelById(panelId);
  const c = candidateById(i.candidateId);

  return `
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="font-semibold text-lg">Bias Scan — private to recruiter</div>
        <div class="text-sm text-[var(--text-2)]">${esc(p.name)}'s feedback on ${esc(c.name)}</div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()">${ICON.x}</button>
    </div>
    <div class="p-5">
      <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-2">Original feedback</div>
      <div class="text-sm bg-[var(--surface)] p-3 rounded border border-[var(--border)] mb-4">${renderBiasHighlighted(f.freeText, f.biasFlags)}</div>

      <div class="text-xs uppercase tracking-wide text-[var(--text-3)] mb-2">Flagged patterns</div>
      <div class="space-y-2 mb-4">
        ${f.biasFlags.map(flag => {
          const category = Object.entries(BIAS_LEXICON).find(([, v]) => v.pattern.test(flag));
          const catKey = category ? category[0] : "other";
          const catData = category ? category[1] : { severity: "low", note: "" };
          return `
            <div class="card p-3">
              <div class="flex items-start gap-2 mb-2">
                <span class="chip ${catData.severity === 'high' ? 'chip-danger' : catData.severity === 'medium' ? 'chip-warn' : ''}">${esc(catKey)} · ${catData.severity}</span>
                <span class="font-mono text-sm">"${esc(flag)}"</span>
              </div>
              <div class="text-sm text-[var(--text-2)]">${esc(catData.note)}</div>
            </div>
          `;
        }).join("")}
      </div>

      <div class="banner banner-info mb-4">${ICON.sparkles}<div class="text-xs">This scan is part of Claude-powered bias detection. The panelist is not notified automatically — you decide whether to coach privately or dismiss.</div></div>

      <div class="flex justify-end gap-2">
        <button class="btn" onclick="closeModal()">Close</button>
        <button class="btn" onclick="toast('Coaching note queued to ${esc(p.name)}');closeModal()">${ICON.mail}Send coaching note</button>
        <button class="btn btn-primary" onclick="toast('Flagged for calibration discussion');closeModal()">Flag for calibration</button>
      </div>
    </div>
  `;
}

/* ==========================================================================
   ACTIONS
   ========================================================================== */
function nav(view) {
  state.view = view; state.currentJobId = null; state.currentCandidateId = null; state.currentInterviewId = null;
  renderApp();
}
function openJob(id) { state.view = "job"; state.currentJobId = id; renderApp(); }
function openCandidate(id) { state.view = "candidate"; state.currentCandidateId = id; renderApp(); }
function openInterview(id) { state.view = "interview"; state.currentInterviewId = id; renderApp(); }
function setRole(r) { state.role = r; state.view = "dashboard"; renderApp(); }

function openScheduler(candidateId, stageId) {
  state.schedulingState = { candidateId, stageId, step: 1, panelSlots: null };
  state.modal = { type: "scheduler" };
  renderApp();
}
function schedulerNext() {
  const { candidateId, stageId } = state.schedulingState;
  const c = candidateById(candidateId);
  const j = jobById(c.jobId);
  const cfg = j.stageConfig[stageId];
  const slots = findOverlappingSlots(cfg.panel, cfg.duration);
  state.schedulingState.step = 2;
  state.schedulingState.panelSlots = slots;
  renderApp();
}
function schedulerSend() {
  state.schedulingState.step = 3;
  renderApp();
}

function openBulkImport(jobId) { state.modal = { type: "bulk-import", data: { jobId } }; renderApp(); }
function openReschedule(interviewId) { state.modal = { type: "reschedule", data: { interviewId } }; renderApp(); }
function openBiasReview(interviewId, panelId) { state.modal = { type: "bias-review", data: { interviewId, panelId } }; renderApp(); }
function openPanelInterview(interviewId) { state.modal = { type: "panel-interview", data: { interviewId } }; renderApp(); }
function openFeedbackForm(interviewId) { state.modal = { type: "feedback-form", data: { interviewId, scores: {}, freeText: "", recommendation: null }, size: "modal-lg" }; renderApp(); }

function setScore(k, n) { state.modal.data.scores[k] = n; renderApp(); }
function setRec(v) { state.modal.data.recommendation = v; renderApp(); }

function submitFeedback() {
  const d = state.modal.data;
  const txt = document.getElementById("fb-free")?.value || "";
  const flags = runBiasScan(txt);
  const flagWords = flags.flatMap(f => f.hits);
  // Persist to INTERVIEWS
  const iv = INTERVIEWS.find(i => i.id === d.interviewId);
  iv.feedback.push({
    panelId: PANELS[0].id,
    submittedAt: new Date(),
    scores: d.scores,
    recommendation: d.recommendation,
    freeText: txt,
    biasFlags: flagWords,
  });
  closeModal();
  if (flagWords.length > 0) {
    toast(`Feedback submitted. AI flagged ${flagWords.length} language pattern(s) — visible to recruiter only.`);
  } else {
    toast("Feedback submitted. Thank you.");
  }
}

function closeModal() { state.modal = null; state.schedulingState = null; renderApp(); }

function toast(msg) {
  const root = document.getElementById("toast-root");
  root.innerHTML = `<div class="toast">${esc(msg)}</div>`;
  setTimeout(() => { if (root.innerHTML.includes(msg.slice(0,20))) root.innerHTML = ""; }, 3500);
}

/* ---------- INIT ---------- */
renderApp();
</script>
</body>
</html>
