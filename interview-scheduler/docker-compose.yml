services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interviewly
      POSTGRES_PASSWORD: interviewly
      POSTGRES_DB: interviewly
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewly"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://interviewly:interviewly@db:5432/interviewly
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      SECRET_KEY: dev-secret-change-me
      SEED_ON_BOOT: "1"
      # --- Integration toggles (swap mocks for real providers) ---
      CALENDAR_PROVIDER: mock          # mock | google | outlook
      EMAIL_PROVIDER: mock             # mock | sendgrid | resend
      BIAS_DETECTOR: regex             # regex | claude
      # --- Real provider creds (unused when providers are mock) ---
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      SENDGRID_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
