<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" role="img" aria-label="Claude-TA — AI-Powered Talent Acquisition Toolkit — 6 intelligent recruiting tools built with Claude 4">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0d"/>
      <stop offset="60%" stop-color="#15161b"/>
      <stop offset="100%" stop-color="#1d1f27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c83e8"/>
      <stop offset="100%" stop-color="#a5acef"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="iconA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c83e8"/>
      <stop offset="100%" stop-color="#5e6ad2"/>
    </linearGradient>
    <linearGradient id="iconB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="iconC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="iconD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="iconE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="iconF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="400" rx="20" fill="url(#bg)"/>

  <!-- Decorative dot grid in upper right -->
  <g fill="#ffffff" opacity="0.05">
    <g>
      <circle cx="1180" cy="40" r="2"/><circle cx="1210" cy="40" r="2"/><circle cx="1240" cy="40" r="2"/>
      <circle cx="1270" cy="40" r="2"/><circle cx="1300" cy="40" r="2"/><circle cx="1330" cy="40" r="2"/>
      <circle cx="1360" cy="40" r="2"/>
      <circle cx="1180" cy="70" r="2"/><circle cx="1210" cy="70" r="2"/><circle cx="1240" cy="70" r="2"/>
      <circle cx="1270" cy="70" r="2"/><circle cx="1300" cy="70" r="2"/><circle cx="1330" cy="70" r="2"/>
      <circle cx="1360" cy="70" r="2"/>
      <circle cx="1180" cy="100" r="2"/><circle cx="1210" cy="100" r="2"/><circle cx="1240" cy="100" r="2"/>
      <circle cx="1270" cy="100" r="2"/><circle cx="1300" cy="100" r="2"/><circle cx="1330" cy="100" r="2"/>
      <circle cx="1360" cy="100" r="2"/>
    </g>
  </g>

  <!-- Subtle radial accent -->
  <circle cx="1100" cy="350" r="180" fill="#5e6ad2" opacity="0.06"/>
  <circle cx="200" cy="60" r="120" fill="#f59e0b" opacity="0.05"/>

  <!-- Top label -->
  <g transform="translate(70, 70)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif">
    <g>
      <rect x="0" y="0" width="184" height="28" rx="14" fill="#5e6ad2" opacity="0.18"/>
      <circle cx="18" cy="14" r="4" fill="#7c83e8"/>
      <text x="32" y="19" font-size="12" font-weight="600" fill="#a5acef" letter-spacing="1.5">BUILT WITH CLAUDE 4</text>
    </g>
  </g>

  <!-- Main wordmark -->
  <g transform="translate(70, 130)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif">
    <text x="0" y="60" font-size="84" font-weight="800" fill="#ffffff" letter-spacing="-2">Claude-TA</text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(70, 220)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif">
    <text x="0" y="0" font-size="26" font-weight="600" fill="url(#accent)">AI-Powered Talent Acquisition Toolkit</text>
    <text x="0" y="32" font-size="16" font-weight="400" fill="#a1a1aa">Six intelligent recruiting tools that automate sourcing, scoring,</text>
    <text x="0" y="54" font-size="16" font-weight="400" fill="#a1a1aa">mapping, communication, intake, and scheduling workflows.</text>
  </g>

  <!-- Big "6" badge top-right -->
  <g transform="translate(1180, 180)" filter="url(#softGlow)">
    <circle cx="60" cy="60" r="80" fill="#5e6ad2" opacity="0.12"/>
    <circle cx="60" cy="60" r="60" fill="url(#iconA)"/>
    <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">6</text>
  </g>
  <g transform="translate(1180, 320)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" text-anchor="middle">
    <text x="60" y="0" font-size="13" font-weight="700" fill="url(#accent)" letter-spacing="2">PROJECTS</text>
    <text x="60" y="20" font-size="12" font-weight="500" fill="#71717a" letter-spacing="0.5">in this toolkit</text>
  </g>

  <!-- Project icon strip along bottom -->
  <g transform="translate(70, 320)">
    <!-- 1. X-Ray Sourcing -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#iconA)"/>
      <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="24" cy="24" r="10"/>
        <line x1="32" y1="32" x2="42" y2="42"/>
      </g>
      <text x="28" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">X-Ray</text>
    </g>
    <!-- 2. Company Mapper -->
    <g transform="translate(80, 0)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#iconB)"/>
      <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 18 L28 12 L42 18 L42 42 L28 36 L14 42 Z"/>
        <line x1="28" y1="12" x2="28" y2="36"/>
      </g>
      <text x="28" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">Mapper</text>
    </g>
    <!-- 3. LinkedIn Scorer -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#iconD)"/>
      <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 38 L20 28 L26 32 L34 18 L42 24"/>
        <circle cx="20" cy="28" r="2" fill="#ffffff"/>
        <circle cx="34" cy="18" r="2" fill="#ffffff"/>
      </g>
      <text x="28" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">Scorer</text>
    </g>
    <!-- 4. RecruiterKeys -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#iconE)"/>
      <g fill="#ffffff">
        <rect x="14" y="16" width="28" height="10" rx="2"/>
        <rect x="14" y="30" width="18" height="10" rx="2"/>
        <rect x="36" y="30" width="6" height="10" rx="2" opacity="0.6"/>
      </g>
      <text x="28" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">Keys</text>
    </g>
    <!-- 5. Intake Hub -->
    <g transform="translate(320, 0)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#iconC)"/>
      <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="22" cy="22" r="6"/>
        <circle cx="36" cy="22" r="5"/>
        <path d="M12 42 Q22 32 32 42"/>
        <path d="M28 42 Q36 34 44 42"/>
      </g>
      <text x="28" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">Intake</text>
    </g>
    <!-- 6. Interviewly (NEW) -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#iconF)"/>
      <g fill="#ffffff">
        <rect x="14" y="16" width="28" height="26" rx="3"/>
        <rect x="14" y="16" width="28" height="7" rx="3" fill="#4c1d95"/>
        <line x1="20" y1="12" x2="20" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="36" y1="12" x2="36" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <g transform="translate(32, 32)">
        <circle cx="6" cy="6" r="7" fill="#10b981"/>
        <polyline points="3,6 5,8 9,4" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="28" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#a5acef" text-anchor="middle">Interviewly</text>
      <!-- "NEW" badge -->
      <g transform="translate(40, -8)">
        <rect x="0" y="0" width="32" height="14" rx="7" fill="url(#orange)"/>
        <text x="16" y="10" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" fill="#0b0b0d" text-anchor="middle" letter-spacing="0.5">NEW</text>
      </g>
    </g>
  </g>
</svg>
