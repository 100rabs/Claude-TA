<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecruiterKeys</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 480px;
      max-height: 560px;
      background: #1c1c1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .popup-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #7c5cff, #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .popup-logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .popup-settings-btn {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .popup-settings-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* Active Role Card */
    .role-card {
      margin: 12px 16px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(124, 92, 255, 0.08);
      border: 1px solid rgba(124, 92, 255, 0.15);
    }

    .role-card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
    }

    .role-card-title {
      font-size: 14px;
      font-weight: 600;
    }

    .role-card-company {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .role-card-empty {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 8px;
    }

    .role-card-empty a {
      color: #a78bfa;
      text-decoration: none;
    }

    /* Quick Actions */
    .section-label {
      padding: 10px 16px 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
    }

    .quick-actions {
      padding: 4px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .quick-action-btn {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      font-family: inherit;
    }

    .quick-action-btn:hover {
      background: rgba(124, 92, 255, 0.1);
      border-color: rgba(124, 92, 255, 0.2);
    }

    .quick-action-icon {
      font-size: 16px;
      margin-bottom: 4px;
      display: block;
    }

    .quick-action-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* Recent Messages */
    .recent-list {
      padding: 4px 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .recent-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      gap: 10px;
      transition: background 0.1s;
    }
    .recent-item:hover {
      background: rgba(255,255,255,0.04);
    }

    .recent-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .recent-content {
      flex: 1;
      min-width: 0;
    }

    .recent-label {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-meta {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 1px;
    }

    .recent-time {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    /* Open Palette Button */
    .open-palette-btn {
      margin: 12px 16px;
      padding: 12px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c5cff, #6b4ee6);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      width: calc(100% - 32px);
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .open-palette-btn:hover {
      opacity: 0.9;
    }

    .popup-footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }

    .popup-footer kbd {
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      font-family: inherit;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">
      <div class="popup-logo-icon">⌨️</div>
      <span class="popup-logo-text">RecruiterKeys</span>
    </div>
    <button class="popup-settings-btn" id="openSettings">⚙ Settings</button>
  </div>

  <div class="role-card" id="roleCard">
    <div class="role-card-label">Active Role</div>
    <div class="role-card-title" id="roleTitle">No role selected</div>
    <div class="role-card-company" id="roleCompany"></div>
  </div>

  <div class="section-label">Quick Actions</div>
  <div class="quick-actions">
    <button class="quick-action-btn" data-command="/outreach">
      <span class="quick-action-icon">🔍</span>
      Cold Outreach
      <span class="quick-action-label">/outreach</span>
    </button>
    <button class="quick-action-btn" data-command="/follow1">
      <span class="quick-action-icon">📨</span>
      Follow Up
      <span class="quick-action-label">/follow1</span>
    </button>
    <button class="quick-action-btn" data-command="/interview-prep">
      <span class="quick-action-icon">🎤</span>
      Interview Prep
      <span class="quick-action-label">/interview-prep</span>
    </button>
    <button class="quick-action-btn" data-command="/offer-verbal">
      <span class="quick-action-icon">🎉</span>
      Make Offer
      <span class="quick-action-label">/offer-verbal</span>
    </button>
  </div>

  <div class="section-label">Recent Messages</div>
  <div class="recent-list" id="recentList">
    <div class="recent-item" style="justify-content:center; color: rgba(255,255,255,0.3); font-size: 12px; padding: 20px;">
      No recent messages yet
    </div>
  </div>

  <button class="open-palette-btn" id="openPalette">Open Command Palette</button>

  <div class="popup-footer">
    Type <kbd>/</kbd> in any text field or press <kbd>Alt+Shift+R</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
